  maxZoom: 18,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>'
}).addTo(map);

// Store layers for toggling
const dayLayers = {};
const markers = [];

DAYS.forEach(day => {
  const group = L.layerGroup();
  
  // Route polyline
  if (day.route && day.route.length > 1) {
    const polyline = L.polyline(day.route, {
      color: day.color,
      weight: 4,
      opacity: 0.8,
      dashArray: day.id === 8 ? '10, 8' : null // dashed for flight
    });
    group.addLayer(polyline);
  }

  // Point markers
  day.points.forEach(pt => {
    const marker = L.circleMarker([pt.lat, pt.lng], {
      radius: 7,
      fillColor: day.color,
      color: '#fff',
      weight: 2,
      fillOpacity: 0.9
    });
    marker.bindPopup(`
      <div style="font-family:-apple-system,'PingFang SC',sans-serif;min-width:150px;">
        <b style="font-size:14px;">${pt.icon} ${pt.name}</b><br>
        <span style="color:#888;font-size:12px;">D${day.id} · ${pt.time}</span><br>
        <a href="https://www.google.com/maps/search/?api=1&query=${pt.lat},${pt.lng}" target="_blank" style="color:#e94560;font-size:12px;">📍 在 Google Maps 中打开</a>
      </div>
    `);
    group.addLayer(marker);
  });

  group.addTo(map);
  dayLayers[day.id] = group;
});

    </div>
    <div class="day-sub">${day.sub}</div>
    <div class="day-detail">
      ${stopsHtml}
      <a class="gmap-link" href="${day.gmapUrl}" target="_blank">🗺️ 在 Google Maps 中查看路线</a>
    </div>
  `;
  
  btn.addEventListener('click', () => {
    // Toggle active
    const wasActive = btn.classList.contains('active');
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    
    if (!wasActive) {
      btn.classList.add('active');
      map.setView(day.center, day.zoom, { animate: true, duration: 0.5 });
      
      // Highlight this day's layer
      DAYS.forEach(d => {
        dayLayers[d.id].eachLayer(l => {
          if (l.setStyle) l.setStyle({ opacity: d.id === day.id ? 1 : 0.15, fillOpacity: d.id === day.id ? 0.9 : 0.15 });
        });
      });
    } else {
      // Reset all layers
      map.setView([-41.5, 172], 5, { animate: true });
      DAYS.forEach(d => {
        dayLayers[d.id].eachLayer(l => {
          if (l.setStyle) l.setStyle({ opacity: 0.8, fillOpacity: 0.9 });
        });
      });
    }
  });
  
  daysEl.appendChild(btn);
});
</script>
</body>
</html>
